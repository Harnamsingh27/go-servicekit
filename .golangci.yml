version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - noctx
    - bodyclose
    - durationcheck
    - exportloopref
    - nilerr

linters-settings:
  goimports:
    local-prefixes: go-servicekit
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
  gosec:
    excludes:
      - G115

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: examples/
      linters:
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0
