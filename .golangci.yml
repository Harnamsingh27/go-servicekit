version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gosec
    - noctx
    - bodyclose
    - durationcheck
    - nilerr
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - noctx
          - bodyclose
          - revive
      - path: examples/
        linters:
          - gosec
          - errcheck
          - noctx
          - revive

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
  gosec:
    excludes:
      - G115  # integer overflow conversion
      - G304  # intentional file path via variable in config package
      - G101  # header name constant mistaken for hardcoded credential
      - G102  # examples intentionally bind to all interfaces
